<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>코칭비 일할계산기</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f7fa;
}

.container-box{
    max-width:600px;
    margin:20px auto;
    padding:15px;
}

.result-card{
    display:none;
}

@media (max-width:576px){

    .container-box{
        margin:10px auto;
        padding:10px;
    }

    h3{
        font-size:1.5rem;
    }

    h4{
        font-size:1.1rem;
    }
}
</style>

</head>
<body>

<div class="container-box">

    <div class="card shadow">
        <div class="card-body">

            <h3 class="text-center mb-4">
                코칭비 일할계산기
            </h3>

            <div class="mb-3">
                <label class="form-label">룸 번호</label>
                <select id="room" class="form-select">
                    <option value="">선택</option>
                    <option value="301">301</option>
                    <option value="302">302</option>
                    <option value="303">303</option>
                    <option value="304">304</option>
                    <option value="305">305</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label">입학일</label>
                <input
                    type="date"
                    id="admissionDate"
                    class="form-control">
            </div>

            <div class="mb-4">
                <label class="form-label">학생 유형</label>
                <select id="type" class="form-select">
                    <option value="">선택</option>
                    <option value="재수">재수</option>
                    <option value="재학">재학</option>
                </select>
            </div>

            <button
                class="btn btn-primary w-100"
                onclick="calculate()">
                계산하기
            </button>

        </div>
    </div>

    <div id="resultCard"
         class="card shadow mt-4 result-card">

        <div class="card-body text-center">

            <h5>계산 결과</h5>

            <h4 id="result"
                class="text-primary my-3">
            </h4>

            <button
                class="btn btn-outline-secondary"
                onclick="copyResult()">
                결과 복사
            </button>

        </div>
    </div>

    <div class="card shadow mt-4">
        <div class="card-body">

            <div class="d-flex justify-content-between align-items-center mb-3">

                <h5 class="mb-0">
                    최근 계산 내역
                </h5>

                <button
                    class="btn btn-sm btn-outline-danger"
                    onclick="clearHistory()">
                    전체 삭제
                </button>

            </div>

            <ul id="historyList" class="list-group">
            </ul>

        </div>
    </div>

</div>

<script>

function calculate(){

    const room =
        Number(document.getElementById("room").value);

    const studentType =
        document.getElementById("type").value;

    const admissionDate =
        document.getElementById("admissionDate").value;

    if(!room || !studentType || !admissionDate){

        alert("모든 항목을 입력해주세요.");
        return;
    }

    const date =
        new Date(admissionDate);

    const month =
        date.getMonth() + 1;

    const entranceDay =
        date.getDate();

    let baseFee;

    if(studentType === "재수"){

        if(room === 301 || room === 305){
            baseFee = 78;
        }else{
            baseFee = 73;
        }

    }else{

        if(room === 301 || room === 305){
            baseFee = 73;
        }else{
            baseFee = 68;
        }
    }

    const year =
        date.getFullYear();

    let daysInMonth;

    if(month === 2){

        const isLeapYear =
            (year % 4 === 0 && year % 100 !== 0)
            || year % 400 === 0;

        daysInMonth =
            isLeapYear ? 29 : 28;

    }else if([4,6,9,11].includes(month)){

        daysInMonth = 30;

    }else{

        daysInMonth = 31;
    }

    let finalWon;

    if(entranceDay === 1){

        finalWon = baseFee * 10000;

    }else{

        const dailyFee =
            Number((baseFee / daysInMonth).toFixed(2));

        const result1 =
            dailyFee *
            (daysInMonth - (entranceDay - 1));

        const result2 =
            baseFee -
            (dailyFee * (entranceDay - 1));

        const finalResult =
            Math.max(result1, result2);

        finalWon =
            Math.round(finalResult * 10000);
    }

    const resultText =
        `${room}호 ${studentType}생 ${month}월 ${entranceDay}일 입학 → ${finalWon.toLocaleString()}원`;

    document.getElementById("result").innerText =
        resultText;

    document.getElementById("resultCard").style.display =
        "block";

    saveHistory(resultText);
}

function copyResult(){

    const text =
        document.getElementById("result").innerText;

    navigator.clipboard.writeText(text)
        .then(() => {
            alert("결과가 복사되었습니다.");
        });
}

function saveHistory(text){

    let history =
        JSON.parse(
            localStorage.getItem("coachingHistory")
        ) || [];

    history.unshift(text);

    history = history.slice(0,3);

    localStorage.setItem(
        "coachingHistory",
        JSON.stringify(history)
    );

    loadHistory();
}

function loadHistory(){

    const history =
        JSON.parse(
            localStorage.getItem("coachingHistory")
        ) || [];

    const historyList =
        document.getElementById("historyList");

    historyList.innerHTML = "";

    if(history.length === 0){

        historyList.innerHTML =
            '<li class="list-group-item text-muted">계산 내역 없음</li>';

        return;
    }

    history.forEach(item => {

        historyList.innerHTML += `
            <li class="list-group-item">
                ${item}
            </li>
        `;
    });
}

function clearHistory(){

    if(!confirm("최근 계산 내역을 모두 삭제할까요?")){
        return;
    }

    localStorage.removeItem("coachingHistory");

    loadHistory();
}

document.addEventListener("keydown", function(e){

    if(e.key === "Enter"){
        calculate();
    }
});

loadHistory();

</script>

</body>
</html>
